name: check generated yamls

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  check:
    name: check generated yamls
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: install vendir
      uses: carvel-dev/setup-action@efbf2625e8469080d87175c02690634d4b0ad476 # v2.2.0
      with:
        only: vendir
    - name: generate manifests
      run: APPLICATION=helm/kube-vip-cloud-provider make update-chart
    - name: check no change
      run: git diff --quiet --exit-code && [ -z "$(git status --porcelain)" ]
